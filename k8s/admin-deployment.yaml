apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitxplore-admin
  labels:
    app: sitxplore-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sitxplore-admin
  template:
    metadata:
      labels:
        app: sitxplore-admin
    spec:
      containers:
      - name: admin
        image: sitxplore-admin:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  selector:
    app: sitxplore-admin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
