version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sitxplore-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitxplore-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/sitxplore
      - PORT=5000
      - JWT_SECRET=supersecretjwtkey123!
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sitxplore-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: sitxplore-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
